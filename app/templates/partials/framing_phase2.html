<div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 mb-4">
    <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 mb-5 text-sm text-emerald-700 text-center">
        ✓ Problem 1 beantwortet. Jetzt ein zweites, unabhängiges Szenario.
    </div>

    <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-5 text-sm text-amber-800">
        <p class="font-semibold mb-1">Szenario (neu formuliert):</p>
        <p>Dieselbe Krankheit bedroht <strong>600 Menschen</strong>. Es gibt erneut zwei Programme.</p>
    </div>

    <p class="font-semibold text-slate-700 mb-4 text-center">Problem 2 – Welches Programm wählst du?</p>

    <form hx-post="/raetsel/framing/result" hx-target="#framing-area" hx-swap="innerHTML">
        <input type="hidden" name="choice1" value="{{ choice1 }}">
        <div class="grid grid-cols-1 gap-4 mb-5">
            <label class="cursor-pointer">
                <input type="radio" name="choice2" value="C" class="sr-only peer" required>
                <div class="border-2 border-slate-200 rounded-xl p-4 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 transition-all">
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-200 text-slate-700 font-bold flex items-center justify-center text-sm flex-shrink-0">C</div>
                        <div>
                            <p class="font-semibold text-slate-800">Programm C</p>
                            <p class="text-slate-600 text-sm mt-1">Mit Sicherheit werden <strong>400 Menschen sterben</strong>.</p>
                        </div>
                    </div>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="choice2" value="D" class="sr-only peer" required>
                <div class="border-2 border-slate-200 rounded-xl p-4 peer-checked:border-indigo-500 peer-checked:bg-indigo-50 transition-all">
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-100 text-red-700 font-bold flex items-center justify-center text-sm flex-shrink-0">D</div>
                        <div>
                            <p class="font-semibold text-slate-800">Programm D</p>
                            <p class="text-slate-600 text-sm mt-1">Mit <strong>1/3 Wahrscheinlichkeit</strong> stirbt niemand. Mit <strong>2/3 Wahrscheinlichkeit</strong> sterben alle 600.</p>
                        </div>
                    </div>
                </div>
            </label>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold transition-colors">
            Auflösung →
        </button>
    </form>
</div>
