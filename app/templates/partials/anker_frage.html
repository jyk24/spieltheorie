<form id="anker-form">
    <input type="hidden" name="frage_idx" value="{{ frage.id }}">
    <input type="hidden" name="anchor" value="{{ anchor }}">
    <input type="hidden" name="answers_json" value="{{ answers_json }}">

    <div class="flex justify-between items-center mb-5">
        <span class="text-sm text-slate-500">Frage {{ frage_num }} / {{ total }}</span>
        <div class="flex gap-1">
            {% for i in range(total) %}
            <div class="w-2 h-2 rounded-full {{ 'bg-indigo-500' if i < frage_num - 1 else ('bg-indigo-300' if i == frage_num - 1 else 'bg-slate-200') }}"></div>
            {% endfor %}
        </div>
    </div>

    <!-- Anker-Zahl prominent zeigen -->
    <div class="text-center mb-6">
        <p class="text-xs text-slate-400 mb-2">Dein zufälliger Anker für diese Frage:</p>
        <div class="inline-block bg-slate-800 text-white text-5xl font-bold rounded-2xl px-8 py-4 mb-2">
            {{ anchor }}
        </div>
        <p class="text-xs text-slate-400">Ist die Antwort höher oder niedriger als {{ anchor }}?</p>
    </div>

    <!-- Die eigentliche Frage -->
    <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-5">
        <p class="font-semibold text-indigo-900">{{ frage.frage }}</p>
        {% if frage.einheit %}
        <p class="text-xs text-indigo-600 mt-1">Antwort in: {{ frage.einheit }}</p>
        {% endif %}
    </div>

    <label class="block text-sm font-semibold text-slate-700 mb-2">Deine Schätzung:</label>
    <div class="flex gap-3 mb-5">
        <input type="number"
               name="schaetzung"
               placeholder="Deine Schätzung..."
               required
               class="flex-1 border-2 border-slate-200 rounded-xl px-4 py-3 text-xl font-bold text-slate-800 focus:border-indigo-400 focus:outline-none text-center">
        <button type="button"
                hx-post="/raetsel/anker-experiment/naechste"
                hx-target="#spiel-area"
                hx-swap="innerHTML"
                hx-include="#anker-form"
                class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors whitespace-nowrap">
            Weiter →
        </button>
    </div>
</form>
