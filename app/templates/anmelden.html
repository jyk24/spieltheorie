{% extends "base.html" %}
{% block title %}Anmelden – VerhandlungsTrainer{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">🎯</div>
            <h1 class="text-2xl font-bold text-slate-800">Willkommen zurück</h1>
            <p class="text-slate-500 mt-1 text-sm">Melde dich an, um deinen Fortschritt zu sehen.</p>
        </div>

        {% if error %}
        <div class="mb-5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/anmelden" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-Mail</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ form_email or '' }}"
                    required
                    autocomplete="email"
                    class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="du@beispiel.de"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Passwort</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full border border-slate-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    placeholder="••••••••"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors text-sm"
            >
                Anmelden
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            Noch kein Konto?
            <a href="/registrieren" class="text-indigo-600 hover:text-indigo-800 font-medium">Jetzt registrieren</a>
        </p>
    </div>
</div>
{% endblock %}
